      strategic_fit:
        score: 3
        grade: "E"
        justification: "Ladders to board KPI but is vitamin, not painkiller. Founders have zero staffing expertise."
      time_to_value:
        raw: 3
        prime: 3  # 6-3
        grade: "E"
        justification: "4-6 weeks first client, 1-2 weeks subsequent. Adequate but not remarkable."
      organizational_friction:
        raw: 5
        prime: 1  # 6-5
        grade: "P"
        justification: >
          Bullhorn AI Fair Use Policy explicitly prohibits business model.
          8 explicit prohibitions against AI/LLM API connection, MCPs,
          third-party access, commercialization. Buyer CANNOT legally use
          ClarityRev without violating Bullhorn TOS. EXISTENTIAL blocker.
        partnership_note: "HIGH RISK PENDING RESOLUTION via partnership talks (~$7K/yr)."
      perceived_risk:
        raw: 3
        prime: 3  # 6-3
        grade: "E"
        justification: "Risk reversal well-designed. Undermined by zero reference clients and Bullhorn compliance liability."
      distributability:
        score: 2
        grade: "H"
        justification: "DEAL-BREAKER. One warm prospect. Zero distribution channels. Founder-market mismatch on distribution."
      compounding:
        score: 2
        grade: "E"
        justification: "0/63 categories high defensibility. No proprietary data. No network effects. Analyst moat doesn't compound."

    rios_calculation:
      formula: "Additive mean of 8 dimensions (3 inverted)"
      dimensions: {qo: 2, pl: 2, sf: 3, ttv_p: 3, of_p: 1, pr_p: 3, d: 2, c: 2}
      sum: 18
      divisor: 8
      rios: 2.25
      lowest_dimension: "Organizational Friction (raw=5, prime=1) — Bullhorn AI Fair Use Policy"
      runner_up: "Distributability (2/5) — founder-market mismatch, no channel"

