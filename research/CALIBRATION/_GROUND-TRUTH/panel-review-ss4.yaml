# =============================================================================
# COMPETITIVE MOAT ASSESSMENT — CORRECTED & NUANCED
# =============================================================================
moat_assessment:
  original_claim: "0 of 63 categories score HIGH defensibility. No proprietary data moat."
  corrected_assessment: >
    The original 0/63 claim is factually accurate but MISLEADING. It reflects
    a narrow definition of "defensibility" based on proprietary training data.
    A proper moat analysis requires considering multiple moat types:

  moat_type_1_proprietary_data:
    score: "LOW"
    assessment: >
      Correct: ClarityRev has no proprietary data. All signals come from
      public or third-party paid sources. Any competitor can access the same
      data sources (DataForSEO, Crunchbase, SEC EDGAR, company blogs, RSS).
      This moat type scores 0/63 categories as HIGH defensibility.
    grade: "E"

  moat_type_2_bullhorn_integration_lock_in:
    score: "MODERATE-HIGH"
    assessment: >
      The original canvas UNDERSTATES this. Bullhorn-native integration is
      a proven moat — Gapstars rejected both Human (no Bullhorn) and Ample
      Market (no Bullhorn). Once ClarityRev's intelligence dossiers are
      embedded in Bullhorn Notes, custom objects, and workflows, the switching
      cost is significant:
      - Replacing ClarityRev requires: (a) extracting all historical
        intelligence from Bullhorn, (b) training a new system on the same
        accounts, (c) rebuilding signal pipelines
      - However, this moat is only as strong as Bullhorn's own CRM dominance.
        If agencies migrate to Spott, Loxo, or Jarvi (AI-native alternatives),
        the Bullhorn lock-in becomes irrelevant.
    grade: "E"
    evidence: "LISA_MARIE_BUYER_PSYCHOLOGY.md confirms rejection of non-Bullhorn tools. PROJECT-STATE.md confirms Bullhorn lock-in claim. Web search confirms AI-native ATS/CRM alternatives gaining traction."

  moat_type_3_staffing_specific_signal_patterns:
    score: "MODERATE"
    assessment: >
      The domain knowledge of WHICH signals matter for technical placements
      (which CTO blogs to monitor, which conference agendas to scan, which
      technical hiring patterns indicate growth) is proprietary operational
      knowledge. A competitor entering this space would need 6-12 months to
      build equivalent signal coverage for IT staffing.
      - Staffing-specific signal taxonomy (15 categories covering CTO
        mentions, conference presentations, patent filings, etc. from
        STAFFING_CAPABILITIES_CATALOG.md) is a form of domain expertise moat.
      - However, this knowledge is in heads and documents, not code — it can
        be replicated.
    grade: "H"

  moat_type_4_eu_data_compliance:
    score: "MODERATE"
    assessment: >
      EU data compliance was a REASONS FOR REJECTION for Ample Market
      ("weak EU data"). GDPR is a meaningful barrier for US-based competitors:
      - US self-serve tools (SyncGTM, LoneScale, Clay) have lighter EU data
        coverage and may not offer GDPR-compliant processing for staffing data
      - This creates a regional moat for EU-based providers like ClarityRev
      - However, this moat erodes as US tools invest in EU compliance
    grade: "E"
    evidence: "LISA_MARIE_BUYER_PSYCHOLOGY.md: 'Ample Market rejected because... weak EU data.' "

  moat_type_5_relationship_with_bullhorn_ecosystem:
    score: "LOW-MODERATE"
    assessment: >
      If ClarityRev becomes a Bullhorn Marketplace app, it gains discovery
      and trust. But this is a double-edged sword: Bullhorn's marketplace
      terms (including the AI Fair Use Policy) could restrict the business
      model entirely, making Bullhorn both the distribution channel AND
      the existential risk.
    grade: "E"

  moat_type_6_analyst_non_obvious_signals:
    score: "LOW-MODERATE"
    assessment: >
      'The moat is the analyst, not the pipe' — the non-obvious signal
      analysis (reading a CTO's blog post about their tech stack choice,
      extracting hiring intent from a conference talk) is harder to automate
      than the component layer. But:
      - This is a PEOPLE moat, not a TECHNOLOGY moat
      - People moats do not scale: adding clients requires adding analysts
      - If ClarityRev plans to scale to 50 clients with zero incremental
        headcount (per SS14 scalability claim of 9.0/10), then the analyst
        layer CANNOT be the moat — it must be automated, which means it's
        replicable
    grade: "E"

  moat_type_7_network_effects:
    score: "LOW"
    assessment: >
      No network effects exist at current scale. If multiple staffing agencies
      share the same signal pipeline, there could be benchmark data effects
      ("we know which signals predict placement success because we see it
      across 30 agencies"), but this requires critical mass. This is a
      MONTHS 6-18 moat, not a MONTHS 1-6 moat.
    grade: "H"

  overall_moat_score:
    score: "LOW-MODERATE (3.5/10)"
    corrected_from: "The original '0 of 63 = no moat' framing"
    rationale: >
      The moat is real but narrow and time-limited:
      - Months 1-6: Bullhorn integration + EU compliance + staffing-specific
        signal patterns provide a MODERATE moat against horizontal competitors
      - Months 6-18: If Bullhorn Amplify's Prospect skill matures (detecting
        external signals natively), the core value proposition weakens.
        Network effects (cross-client signal benchmarks) are the only path
        to a durable moat.
      - The DIRE assessment is not "0 of 63 categories" — it's that ClarityRev
        has 6-18 months to build a moat before Bullhorn or an AI-native ATS
        replicates the value proposition.

# =============================================================================
# PORTER'S FIVE FORCES — REVISED ANALYSIS
# =============================================================================
porters_five_forces:
  original_assessment: "Structural attractiveness score: MODERATE (3.0/5)"
  revised_assessment: "MODERATE-LOW (2.5/5) — corrected for Bullhorn supplier power and Amplify threat"

  threat_of_new_entrants:
    score: "HIGH (4/5)"
    assessment: >
      HIGH threat level, HIGHER than original assessment. New entrants can
      enter because:
      - All data sources are public/third-party (no proprietary data barrier)
      - Claude Code/LLMs lower the build cost dramatically ($20-400/mo for
        DIY signal detection)
      - Bullhorn's API is documented and accessible (GREEN per assessment)
      - The managed service model has high gross margins, attracting entrants
      - The niche is SMALL (31 Benelux agencies) — most entrants will ignore
        it, but a SINGLE focused competitor could capture it entirely
    grade: "H"

  threat_of_substitutes:
    score: "VERY HIGH (4.5/5)"
    assessment: >
      HIGHER than original assessment. Documented substitutes include:
      - Bullhorn Amplify (free with existing subscription) — the #1 threat
      - DIY stack (PitchGhost + Textkernel + Sales Nav) at ~$250-400/mo
      - Claude Code at $20-400/mo
      - In-house analyst at EUR 35K-50K/yr
      - Gong (already proven with Kelly Services at 36% placement lift)
      - AI-native ATS/CRM replacement (Spott, Loxo, Jarvi) eliminates the
        need for a Bullhorn-native add-on
    grade: "E"

  bargaining_power_of_suppliers:
    score: "HIGH (4/5)"
    assessment: >
      Bullhorn has SIGNIFICANT supplier power because:
      - ClarityRev's value proposition is Bullhorn-native delivery
      - Bullhorn's API terms (including AI Fair Use Policy) can restrict
        the business model — this is a confirmed BLOCKER
      - Bullhorn could BUILD the same feature (Prospect skill in Amplify)
        and cut off API access to third parties
      - Data source providers (DataForSEO, etc.) have moderate power —
        they're diversified across many customers
      - Key mitigation: ClarityRev's architecture is CRM-agnostic, reducing
        dependency on Bullhorn (though current go-to-market is Bullhorn-first)
    grade: "E"

  bargaining_power_of_buyers:
    score: "MODERATE (3/5)"
    assessment: >
      Mid-market staffing agencies have moderate power:
      - Fragmented buyer side (31+ agencies in Benelux, none dominant) reduces
        individual buyer power
      - BUT: the switching cost from NOT buying is low (status quo + DIY = low)
      - Gapstars-specific ceiling of EUR 3K/month suggests price sensitivity
      - Lisa-Marie's leverage: 'if you don't work for us at EUR 2,950, someone
        else will do it cheaper or we'll build it ourselves'
    grade: "E"

  rivalry_among_existing:
    score: "LOW-MODERATE (2.5/5)"
    assessment: >
      LOW rivalry in the exact managed RI for staffing space because NO
      competitor occupies this exact conjunction. However:
      - The niche is TINY (31 agencies, ~EUR 1.1M/yr TAM) — zero-sum dynamics
        if a competitor enters
      - Horizontal RI tools (SyncGTM, Trigify, LoneScale) don't target this
        niche but could pivot into it with staffing-specific configuration
      - Competition is more 'substitute competition' than 'direct competitor
        rivalry'
    grade: "H"

# =============================================================================
# WARDLEY MAPPING — POSITION ON VALUE CHAIN
# =============================================================================
wardley_mapping:
  note: >
    Wardley Mapping evaluates where ClarityRev's components sit on the
    evolution axis (Genesis → Custom → Product → Commodity).

  signal_acquisition:
    evolution: "Custom → Product"
    assessment: >
      Most signal sources are readily available as products (DataForSEO API,
      Crunchbase, RSS feeds, SEC EDGAR). However, the CURATION of WHICH
      signals matter for IT staffing is still custom work. The non-obvious
      signal types (CTO blog analysis, conference talk extraction) are
      closer to Custom — no off-the-shelf API provides "CTO mentions hiring
      plan" as a structured output.
    grade: "E"

  signal_analysis:
    evolution: "Genesis → Custom"
    assessment: >
      The transformation of raw signals into structured intelligence
      dossiers with source-verified citations and conversion-rate estimates
      is still Genesis/Custom. No productized service provides
      "staffing-specific revenue intelligence" as a commodity. This is
      ClarityRev's strongest position — it's building a product where
      none exists.
    grade: "H"

  crm_integration:
    evolution: "Product → Commodity"
    assessment: >
      CRM API integration is approaching commodity. REST APIs, OAuth, webhook
      delivery — these are standard engineering patterns. Bullhorn-specific
      integration is Product-level (Bullhorn's API has quirks), not commodity.
    grade: "E"

  managed_delivery:
    evolution: "Custom"
    assessment: >
      The managed service layer (human analyst reviews, quality-checks, and
      delivers intelligence) is fundamentally custom work. This is ClarityRev's
      DIFFERENTIATOR but also its scalability constraint. The original SS14
      claim of 9.0/10 scalability (50 clients, no incremental headcount)
      CONTRADICTS the managed delivery model — if it's truly automated, it's
      not a managed service.
    grade: "E"

  strategic_implication: >
    ClarityRev should aim to move signal analysis from Genesis/Custom to
    Product within 6-12 months. The managed service is the ENTRY VEHICLE
    (differentiator), but automated product delivery is the SCALE VEHICLE.
    This aligns with the original canvas's RIOS score of 7.2 — the piece
    that enables scalability is productizing signal analysis.

# =============================================================================
# BLUE OCEAN STRATEGY ANALYSIS
# =============================================================================
blue_ocean_strategy:
  note: >
    Blue Ocean asks: what factors can we Eliminate, Reduce, Raise, Create
    to open uncontested market space?

  eliminate:
    - "Per-seat pricing (every staffing RI competitor charges per user — eliminate this friction)"
    - "Annual contracts (Ample Market rejected for 'year contract only' — month-to-month is a Blue Ocean factor)"
    - "Abstract 'AI platform' language (buyers want concrete, tangible intelligence, not technology)"

  reduce:
    - "Feature breadth vs depth (don't try to match SyncGTM's 40+ integrations — focus on Bullhorn delivery depth)"
    - "Learning curve (current tools require training; Lisa-Marie explicitly said training kills adoption)"
    - "Price (from EUR 2,950 to EUR 1,500 entry via pilot de-risks the purchase)"

  raise:
    - "Bullhorn integration depth (go BEYOND API sync — embed intelligence in Bullhorn Notes, custom objects, workflows)"
    - "Signal quality / source verification (competitors show signals; ClarityRev shows SIGNALS + SOURCE EVIDENCE + CONVERSION DATA)"
    - "Risk reversal (performance guarantee: 'no signals, no payment' — competitors don't offer this)"
    - "EU data compliance (Ample Market rejected for weak EU data — make this a flag)"

  create:
    - "Staffing-specific revenue intelligence as a MANAGED service (NO competitor does this combination)"
    - "Non-obvious signal types (CTO blog analysis, conference talk extraction, technical hiring pattern detection)"
    - "Intelligence dossier format (structured, scannable, source-verified account briefs — not just a signal feed)"
    - "Benchmark cross-client data ('we see these signals across 30 agencies — here's what they mean for YOUR pipeline')"

  strategy_canvas_implication: >
    ClarityRev's Blue Ocean is NOT "revenue intelligence for staffing"
    (multiple competitors offer pieces of this). It's:
    (Bullhorn-native + managed service + staff-specific intelligence +
    performance guarantee + month-to-month + EU compliance).
    This combination is UNIQUE in the market.

