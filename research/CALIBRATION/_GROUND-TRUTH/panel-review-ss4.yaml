corrected_taxonomy:
  note: >
    Competitors are reorganized into FIVE distinct categories by substitution
    type, not a flat list. This reflects how a staffing agency would actually
    evaluate options.

  category_1_direct_managed_ri_for_staffing:
    title: "Category 1: Managed Revenue Intelligence for Staffing Agencies"
    description: >
      Companies selling a managed service (human analyst + software) that
      delivers sales intelligence/signals to staffing agencies. This is the
      category ClarityRev competes in.
    competitors:
      - name: "None confirmed"
        pricing_visible: "N/A"
        description: >
          No competitor was found that sells a managed revenue intelligence
          service specifically for staffing agencies at any price point.
          The original canvas claimed SyncGTM (which turned out to be
          self-serve, not managed) and RevPartners (which turned out to be
          a HubSpot consultancy). Joveo AI Staffing Advisor is closest in
          FUNCTION (staffing-specific predictive analytics) but is a
          self-serve dashboard, not a managed service.
        grade: "E"
        evidence: "Extensive web search across 15+ queries for 'revenue intelligence staffing agency managed service' returned no competitor offering this exact conjunction."
    assessment: >
      WHITE SPACE CONFIRMED — but the question "is this because nobody can
      do it or because the unit economics don't close?" remains unanswered
      from the original canvas. The corrected competitive data makes the
      white space LARGER than originally claimed (removed SyncGTM and
      RevPartners as managed competitors), NOT smaller.

