        delivery: "Bullhorn + weekly calls + dossiers"
        bullhorn: "Yes"
        accounts: "5+"
        signals: "25+ sources incl. non-obvious (CTO blogs, conferences)"
        guarantee: "Dedicated analyst, 48hr turnaround"
