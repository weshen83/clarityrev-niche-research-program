    market_entry_strategy: >
      For the remaining 30 Benelux IT staffing agencies, lead with EUR 1,800/mo
      as the core managed service price, with a EUR 800/mo "Signal Scan" entry
      tier for smaller agencies. Test these prices with 5-10 discovery calls
      before committing to final bands. Gather: (a) average placement fee,
      (b) current deals volume, (c) win rate, (d) DIY capability.

    pricing_principle: >
      Price to the VALUE of one additional placement, not to the cost of tool
      delivery. If the average placement fee is EUR 15K and ClarityRev helps
      close 1 extra per year, the ROI case at EUR 1,800/mo (EUR 21,600/yr)
