# - Expert domain knowledge (20 years Benelux mid-market IT staffing)
# - Live web evidence via Firecrawl pipeline (5 searches, 10 scrapes, R6 feedback)
# - Bullhorn API Fair Use Policy (direct read from bullhorn.github.io)
# - 6sense market share data (direct scrape)
# - Bullhorn GRID 2026 Industry Trends Report (direct scrape)
