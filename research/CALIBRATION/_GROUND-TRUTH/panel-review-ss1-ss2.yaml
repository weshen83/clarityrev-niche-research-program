panel_review:
  niche_id: "CAL-A"
  reviewer: "Managing Director — Benelux IT Staffing (20 yrs)"
  review_date: "2026-07-23"
  evidence_sources:
    live_web:
      - "Bullhorn API Fair Use Policy: https://bullhorn.github.io/api-fair-use-policy/"
      - "6sense Bullhorn Market Share: https://6sense.com/tech/recruiting-agency/bullhorn-market-share"
      - "Bullhorn GRID 2026 Industry Trends: https://www.bullhorn.com/grid/2026-industry-trends/report/"
      - "LinkedIn Sales Navigator pricing: multiple sources (EUR 87/seat/month core)"
      - "RefAssured Sales Signal (Bullhorn marketplace): https://www.bullhorn.com/marketplace/refassured/"
      - "SyncGTM pricing: https://www.softwareadvice.com/product/546743-SyncGTM/"
      - "Staffing tech budgets: StaffingHub/State of Staffing 2025"
      - "6W Research: Europe IT Staffing Market ~USD 31.4B (2025)"
    firecrawl_pipeline:
      - "search-benelux-staffing.json — verified Benelux agency landscape"
      - "search-bullhorn-share.json — verified 34.37% market share"
      - "search-refassured-pricing.json — confirmed RefAssured live product"
      - "search-staffing-budget.json — confirmed 5-15% tech spend of revenue"
      - "bullhorn-ats-report.md — Bullhorn 2026 ATS report (nav-heavy)"
      - "6sense-bullhorn-share.md — confirmed 4,438 Bullhorn customers, 34.37% share"
      - "bullhorn-grid-2026.md — 2,300-respondent survey, AI #1 priority"
      - "staffing-tech-budgets.md — login-walled but excerpts available"
      - "refassured-sales-signal.md — cookie-walled but search confirmed Bullhorn integration"
