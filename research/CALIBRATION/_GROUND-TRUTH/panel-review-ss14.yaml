# =============================================================================
# VC PANEL REVIEW: CAL-A SS14 (RIOS SCORE)
# =============================================================================
# Panelist: B2B SaaS VC Partner (Accel / Bessemer / a16z archetype)
# Review date: 2026-07-23
# Purpose: Adversarial re-scoring of SS14 using NICHE-METHODOLOGY.md §14
#   (8-dimension RIOS formula, 1-5 scale, additive mean, score inflation
#   detection, evidence grade inheritance)
#
# ORIGINAL CANVAS SS14 PROBLEMS (summary):
# 1. Used 1-10 scale with 4 arbitrary sub-dimensions (R/I/O/S) — NOT the
#    methodology's 8-dimension RIOS formula with additive mean and inversions.
# 2. Original score of 7.2/10 maps to ~3.6/5 — but the correct score is 2.375/5.
# 3. Several "sub-scores" were inflated: Scalability 9.0/10 is unsupported.
# 4. The Bullhorn AI Fair Use Policy is more specific and restrictive than the
#    canvas acknowledges (actual policy text verified via web search).
# 5. SyncGTM's published pricing is $99-649/mo self-serve, NOT EUR 2,300/mo
#    managed — the canvas's #1 competitor characterization is inaccurate.
# =============================================================================

panel_review_ss14:
  methodology_version: "NICHE-METHODOLOGY.md §14 — 8-dimension RIOS, additive mean, 1-5 scale"
  date: "2026-07-23"
  panelist_role: "B2B SaaS VC Partner — TAM/SAM/SOM, founder/market fit, GTM assessment"

  # ============================================================================
  # CORRECTED GATE CHECK (NICHE-METHODOLOGY §14 Part A)
  # ============================================================================
  gate_check:
    gate_1_eur_500k_net_profit:
      result: "BORDERLINE"
      evidence_grade: "H"
      math: >
        NET PROFIT FORMULA: Net Annual Profit = (Clients × ARPU × 12) × GrossMargin − FixedCosts

        ASSUMPTIONS:
        - ARPU = EUR 2,950/mo (Gapstars-specific, unvalidated beyond one prospect)
        - Gross Margin = 70% (estimated: DataForSEO + Firecrawl + Claude API per client)
        - Annual Fixed Costs = EUR 36,000 (from methodology template)

        AT 25 CLIENTS (optimistic):
        Gross revenue: 25 × 2,950 × 12 = EUR 885,000
        Gross profit: 885,000 × 0.70 = EUR 619,500
        Net profit: 619,500 − 36,000 = EUR 583,500
        PASSES — but requires 25 clients in a market of 31 known Benelux agencies
        = 81% market share. THIS IS UNREALISTIC.

        AT 10 CLIENTS (realistic Year 1-2):
        Gross revenue: 10 × 2,950 × 12 = EUR 354,000
        Gross profit: 354,000 × 0.70 = EUR 247,800
        Net profit: 247,800 − 36,000 = EUR 211,800
        FAILS — less than half the EUR 500K target.

        AT 15 CLIENTS (aggressive but plausible):
        Net profit: 15 × 2,950 × 12 × 0.70 − 36,000 = EUR 335,700
        FAILS — still 33% short of target.

        Clients needed for EUR 500K: (500,000 + 36,000) / (2,950 × 12 × 0.70) = 21.6 clients.
        This requires penetrating 70% of the known Benelux market or expanding geographically
        before unit economics are proven. With Bob having ZERO staffing industry contacts,
        this is not achievable within 24 months.

        EU EXPANSION WHAT-IF:
        If TAM expands to 100+ agencies across Benelux + DACH:
        22 clients at EUR 2,950 → EUR 500K net profit.
        Plausible only if (a) Gapstars closes, (b) Bullhorn policy clears, (c) Bob builds
        staffing network from scratch. Timeline: 36+ months.

        VERDICT: BORDERLINE — passes only under optimistic assumptions (22+ clients at
        EUR 2,950/mo ARPU). FAILS under realistic assumptions (10-15 clients in 24 mo).
        The EUR 500K gate is the WEAKEST gate.

    gate_2_scalable_productizable:
      result: "PASS"
      evidence_grade: "E"
      justification: >
        Software delivery, multi-tenant signal pipeline. Add client = add their Bullhorn
        tenant. No per-client manual work in recurring model. Variable costs are API credits,
        which scale linearly with client count.

    gate_3_in_bounds_b2b:
      result: "PASS"
      evidence_grade: "P"
      justification: "IT staffing agencies are B2B. Niche is well-bounded per SS1."

    gate_4_revenue_intelligence_category:
      result: "PASS"
      evidence_grade: "E"
      justification: >
        Signal detection (20+ sources) + CRM-native delivery (Bullhorn). Fits the
        "intelligence that drives revenue, delivered in-system" definition.

  # ============================================================================
  # CORRECTED RIOS VALUE EQUATION SCORE (NICHE-METHODOLOGY §14 Part B)
  # ============================================================================
  # Each dimension scored 1-5 using calibration anchors:
  # 1 = Critical weakness  2 = Significant weakness  3 = Adequate
  # 4 = Strong (differentiated)  5 = Exceptional (best-in-class)
  #
  # Three dimensions are inverted: TTV_prime = 6 - TTV, OF_prime = 6 - OF,
  # PR_prime = 6 - PR (so that higher scores always improve RIOS).
  # ============================================================================

  rios_dimensions:
    # --- Numerator dimensions (higher raw score = better) ---

    quantified_outcome:
      raw_score: 2
      evidence_grade: "H"
      cross_reference: "§3.3 (ROI proof — absent), §10.2 (pricing — single prospect)"
      justification: >
        The quantified outcome is weak at best. The EUR 10,400-30,000/mo TCO comparison
        (non-selling time cost) is estimated, unconfirmed by any client, and lacks
        third-party validation. The EUR 2,950/mo cost is Gapstars-specific. No published
        benchmarks, no case studies, no independent ROI verification for this niche.
        Even the methodology's "visceral EUR number" is absent — the value prop is
        "better pipeline visibility" without a dollar figure attached to it.
        SCORE 2: Significant weakness. A 4-person sales team saving non-selling time
        is a plausible story but unquantified. At zero clients, this is a promise,
        not an outcome.

    proven_likelihood:
      raw_score: 2
      evidence_grade: "H"
      cross_reference: "§12 (evidence stack), §12.13.3 (zero-client confidence)"
      justification: >
        Per methodology: "At zero clients: maximum score = 2." Even within this
        constraint, the evidence is thin. The strongest evidence is one warm prospect
        (Gapstars) that hasn't closed. The Bullhorn integration is desk-researched
        (API docs read) but NEVER built for a real client. Most critical claims are
        [E] or [H] grade. Zero case studies, zero reference calls, zero pilots completed.
        SCORE 2: Correct by methodology rule. Cannot be higher at zero clients.

    strategic_fit:
      raw_score: 3
      evidence_grade: "E"
      cross_reference: "§2.1 (committee — staff agencies care about revenue predictability), §8.2 (placement velocity)"
      justification: >
        The offer ladders to a board-level KPI for staffing agencies: revenue per
        consultant, time-to-fill, placement velocity. Pipeline visibility directly
        impacts these. The "pipeline-to-placement" narrative is coherent.
        HOWEVER, this is a VITAMIN, not a painkiller. Staffing agencies have survived
        for decades with LinkedIn Recruiter + spreadsheets. The pain of poor pipeline
        visibility is real but not existential. And critically: the founders have
        ZERO staffing industry domain expertise. This is NOT factored into Strategic
        Fit (it's evaluated under Distributability and Organizational Friction), but
        it means the fit between the offer and the founder team is poor.
        SCORE 3: Adequate. Ladders to board KPI but the link is indirect. Not
        differentiated from what agencies already have (DIY, LinkedIn, internal analysts).

    distributability:
      raw_score: 2
      evidence_grade: "H"
      cross_reference: "§5 (ecosystem — none), §13.1 (channel — none)"
      justification: >
        THIS IS THE DEAL-BREAKER DIMENSION. ClarityRev has ONE warm prospect (Gapstars)
        and ZERO distribution channels into the staffing niche. Bob's executive network
        is enterprise B2B SaaS (Adobe sales) — he has NO existing relationships with
        staffing agency owners or commercial directors. The 31-company Benelux prospect
        list is tiny for cold outreach.
        The Bullhorn marketplace is a potential channel but requires partnership
        approval (separate agreement, technical validation, 15-customer cap before
        terms must be renegotiated). No aggregators, no referral partners, no channel
        exist.
        Without a founder with staffing industry connections, outbound to 31 cold
        prospects with a EUR 2,950/mo unproven product has a close rate approaching zero.
        SCORE 2: Significant weakness. Founder-market mismatch on distribution is the
        single hardest problem to fix. It takes 12-24 months to build a network from
        scratch in a new vertical.

    compounding:
      raw_score: 2
      evidence_grade: "E"
      cross_reference: "§10.4 (moat trajectory — flat), §4 (competitors — commoditized layer)"
      justification: >
        0 of 63 categories in the defensibility audit score HIGH. No proprietary data.
        No network effects. No data flywheel. The "moat is the analyst" thesis is
        appealing but fundamentally doesn't compound — analysts get tired, they quit,
        they cost more. Each client adds signal tuning effort, not signal quality
        improvement across the client base.
        Benchmark data MIGHT compound after 10+ clients (e.g., "staffing agencies
        using ClarityRev fill roles 18% faster" — but this requires 10 clients first,
        which is 2+ years away).
        Self-serve competitors (Trigify EUR 37/mo, SyncGTM $99/mo) commoditize the
        component layer. Any signal ClarityRev can detect, they can detect.
        SCORE 2: Significant weakness. No compounding mechanism exists today.
        The business gets marginally better with each client (more benchmarks,
        refined signals) but not structurally so.

    # --- Denominator dimensions (higher raw score = worse → inverted) ---

    time_to_value:
      raw_score: 3
      evidence_grade: "E"
      cross_reference: "§7.1 (TTV targets), §8.2 (turnaround — not built)"
      justification: >
        TTV from "yes" to "live signals" for first client: estimated 4-6 weeks.
        Bullhorn API integration is 1-3 days (REST API, OAuth, documented).
        Signal pipeline (20+ sources) is 2-4 weeks of engineering. For subsequent
        clients: 1-2 weeks (multi-tenant architecture).
        This is adequate but not remarkable. A prospect could sign up for SyncGTM
        self-serve and have basic signals in hours.
        SCORE 3 (Adequate — meets baseline). TTV_prime = 6 - 3 = 3.

    organizational_friction:
      raw_score: 5
      evidence_grade: "E"
      cross_reference: "§1.4 (data accessibility — Bullhorn AI policy BLOCKER)"
      justification: >
        CRITICAL UPDATE FROM ACTUAL BULLHORN API FAIR USE POLICY (verified Dec 17, 2025):
        The policy explicitly prohibits:
        1. "Connecting the API to third-party AI or LLM tools for viewing or updating
           data or generating summaries or reports" without Bullhorn's written permission.
           This DIRECTLY prohibits ClarityRev's signal analysis + CRM delivery model.
        2. "Model Context Protocols (MCPs)" — explicitly named as prohibited.
           This affects the Claude Code integration architecture.
        3. "Bulk transfer of data to unauthorized solutions or models."
        4. Commercialization for resale requires a "separate agreement" with Bullhorn.
        5. Developer Program: 15-customer activation cap before terms must be renegotiated.
        Additionally: Leads module requires Bullhorn Enterprise (uncertain at Gapstars).
        Bullhorn can terminate API access "at any time, with or without reason."
        The policy is not a "potential blocker" — it explicitly prohibits ClarityRev's
        business model unless a formal partnership agreement is signed. Bullhorn has
        zero incentive to grant this to a pre-revenue startup that competes with their
        own analytics features and ecosystem partners.
        SCORE 5: Critical weakness — would block purchase and/or delivery. The buyer
        cannot legally use ClarityRev with their Bullhorn instance without violating
        their Bullhorn TOS. This is existential.

    perceived_risk:
      raw_score: 3
      evidence_grade: "E"
      cross_reference: "§9.2 (risk reversal — well-designed), §12.9 (guarantee data-underwritten)"
      justification: >
        The risk reversal mechanisms are genuinely well-designed:
        - 14-day cancellation (month-to-month)
        - Performance guarantee (free month if no qualified signals for 14 days)
        - Pilot pricing (EUR 1,500/mo for first 2 months)
        These are stronger than most early-stage SaaS offerings and directly address
        the champion's #1 fear (looking stupid internally).
        HOWEVER, at zero clients, these are promises without a track record. A prospect
        is betting on an unproven vendor. No reference calls, no case studies, no
        "social proof" to offset the inherent risk of a pre-revenue startup.
        The Bullhorn compliance risk also feeds into this — a buyer who runs this
        past legal will get a "NO."
        SCORE 3: Adequate. Risk reversal mechanics are excellent but undermined by
        zero reference clients and the Bullhorn compliance liability.

  # ============================================================================
  # RIOS FORMULA CALCULATION
  # ============================================================================
  # Inversions:
  #   TTV_prime = 6 - 3 = 3
  #   OF_prime  = 6 - 5 = 1
  #   PR_prime  = 6 - 3 = 3
  #
  # RIOS = mean(Quantified Outcome, Proven Likelihood, Strategic Fit,
  #             TTV_prime, OF_prime, PR_prime,
  #             Distributability, Compounding)
  #
  # RIOS = mean(2, 2, 3, 3, 1, 3, 2, 2)
  # RIOS = 18 / 8 = 2.25
  # ============================================================================

  rios_score_calculation:
    formula: "Additive mean of 8 dimensions (3 inverted)"
    dimensions_input:
      quantified_outcome: 2
      proven_likelihood: 2
      strategic_fit: 3
      ttv_prime: 3  # inverted from TTV raw=3
      of_prime: 1   # inverted from OF raw=5
      pr_prime: 3   # inverted from PR raw=3
      distributability: 2
      compounding: 2
    sum: 18
    divisor: 8
    rios_score: 2.25
    rios_score_10_scale: 4.5  # converted for comparison (2.25 × 2)
    evidence_grade: "H"  # weakest grade across all dimensions
    confidence: "LOW"    # per §14 Part B: [H] evidence = LOW confidence
    inflation_check: "PASSED — lowest score IS ≤2 (OF=5 raw, Compounding=2, Quantified=2, Proven=2, Distributability=2). Zero dimensions scored 5. No inflation detected."

  # ============================================================================
  # ORIGINAL vs CORRECTED COMPARISON
  # ============================================================================
  score_comparison:
    original:
      scale: "1-10 (non-standard)"
      score: 7.2
      verdict: "PROMISING with cautions"
      subscores: {revenue: 7.5, implementation: 6.5, moat: 5.5, scalability: 9.0}
    corrected:
      scale: "1-5 (methodology-compliant RIOS)"
      score: 2.25
      verdict: "VALIDATE FIRST"
      subscores: "8-dimension RIOS, see above"
    delta: "-4.95 points on 1-10 scale equivalent (from 7.2 to 2.25)"
    root_causes:
      - "Original used 1-10 scale instead of 1-5 RIOS methodology"
      - "Original used 4 arbitrary sub-dimensions instead of 8 specific RIOS dimensions"
      - "Scalability 9.0 was grossly inflated — software delivery is scalable but ACQUIRING clients is not"
      - "Implementation Feasibility 6.5 missed the actual Bullhorn AI Fair Use Policy text"
      - "Revenue Potential 7.5 assumed EUR 2,950/mo generalizes — undemonstrated"
      - "No Bullhorn AI Fair Use Policy verification was done (canvas itself flagged this)"

  # ============================================================================
  # LOWEST-TERM DIAGNOSIS (NICHE-METHODOLOGY §14 Part C)
  # ============================================================================

  lowest_term_diagnosis:
    lowest_dimension: "Organizational Friction — raw_score: 5 (OF_prime: 1)"
    why_lowest: >
      The Bullhorn API Fair Use Policy explicitly prohibits ClarityRev's business
      model. The policy forbids: connecting the API to third-party AI/LLM tools for
      generating summaries/reports, using MCPs with Bullhorn data, commercializing
      integrated services without a separate agreement, and exceeds 15 customers
      without renegotiated terms. The buyer cannot legally use ClarityRev without
      violating their Bullhorn TOS. This is existential — if this dimension doesn't
      improve, the niche is dead.
    proposed_fix: >
      Phase 1 (Urgent, 30 days): Have Bob/Bullhorn-friendly counsel review the AI
      Fair Use Policy and determine: (a) Does "writing Bullhorn Notes via API" count
      as "connecting to third-party AI for summaries"? (b) Is a one-way write-only
      integration exempt? (c) What would a "separate agreement" with Bullhorn require?
      Phase 2 (60 days): If the policy truly prohibits the model, redesign the CRM
      delivery layer to be Bullhorn-AGNOSTIC — deliver signals via email, Slack,
      Notion, or a lightweight dashboard instead of Bullhorn-native. This sacrifices
      the #1 competitive differentiator but preserves the business.
      Phase 3 (90 days): Explore Bullhorn marketplace partnership application.
      This would resolve the policy issue but is a 6+ month process.
    fix_owner: "Wesley (Phase 1 legal review) + Bob (Phase 3 partnership outreach)"
    fix_timeline: "Phase 1: 30 days. Phase 2: 60 days. Phase 3: 6+ months."
    fix_confidence: "LOW — the fix requires Bullhorn's cooperation (separate agreement or marketplace approval). ClarityRev has no leverage and no track record. If Bullhorn enforces the policy, the niche thesis breaks entirely."
    runner_up_lowest:
      dimension: "Distributability — score: 2"
      why: "Founder-market mismatch. Bob has zero staffing industry network."
      proposed_fix: "Identify and recruit a staffing-industry advisor or part-time BD lead with existing relationships. This is a PEOPLE fix, not a product fix."
      fix_confidence: "MEDIUM — possible but adds cost and founder-dilution complexity."

  # ============================================================================
  # OVERALL NICHE VERDICT (NICHE-METHODOLOGY §14 Part D)
  # ============================================================================

  verdict: "VALIDATE FIRST"
  verdict_confidence: "LOW"
  verdict_rationale: >
    RIOS score of 2.25/5 is well below the 3.0 threshold for LAUNCH PENDING. The
    EUR 500K gate is BORDERLINE (passes only at 22+ clients, requiring 70% market
    penetration). Three dimensions score at critical/significant weakness levels:
    Organizational Friction (Bullhorn policy existential blocker), Distributability
    (founder-market mismatch on distribution), and Compounding (no data moat).

    The Bullhorn AI Fair Use Policy is the single most dangerous finding. Unlike
    the original canvas's characterization as a "potential blocker," actual review
    of the policy text reveals it explicitly prohibits ClarityRev's business model.
    This is not a code problem — it's a legal/commercial problem that requires
    Bullhorn's cooperation to resolve.

    The original canvas's "LAUNCH PENDING — Gapstars as first client" verdict
    assumed the product could be delivered. If the Bullhorn AI Fair Use Policy is
    enforced, the product CANNOT be delivered to ANY Bullhorn customer.

    HOWEVER, the niche IDENTIFICATION (SS1) is excellent — the market is real,
    well-bounded, and data-rich. The BUYER PERSONA research (SS2) is outstanding —
    Lisa-Marie's psychology, decision criteria, and buying process are deeply
    understood. The gap is not in market understanding — it's in (a) Bullhorn
    compliance, (b) founder-market fit on distribution, (c) unvalidated pricing
    generalizability.

    VALIDATE FIRST means: Resolve the Bullhorn policy question before any further
    build investment. This is the binding gate. If the policy allows the model,
    THEN validate WTP generalizability through 3-5 discovery calls with other
    Benelux IT staffing agencies (not just Gapstars). THEN revisit the RIOS score.
  verdict_gate_matrix:
    - gate: "Gate 1 — EUR 500K net profit path"
      pass: "BORDERLINE"
      confidence: "LOW"
    - gate: "Gate 2 — Scalable & productizable"
      pass: "PASS"
      confidence: "HIGH"
    - gate: "Gate 3 — In-bounds (B2B)"
      pass: "PASS"
      confidence: "HIGH"
    - gate: "Gate 4 — Revenue Intelligence category"
      pass: "PASS"
      confidence: "HIGH"
  verdict_confidence_breakdown:
    - factor: "Evidence grades across all dimensions"
      grade: "H"
      impact: "LOW confidence — desk research only, no primary validation"
    - factor: "Bullhorn AI Fair Use Policy not yet verified by legal counsel"
      grade: "E"
      impact: "Major risk — the policy text was read (this review) but not legally interpreted"
    - factor: "EUR 2,950/mo pricing based on single prospect"
      grade: "H"
      impact: "Cannot assume generalizes. Needs 3-5 buyer conversations."
    - factor: "Signal pipeline never built for real client"
      grade: "E"
      impact: "Demo is hardcoded. Build effort is estimated, not measured."

  # ============================================================================
  # SENSITIVITY ANALYSIS (NICHE-METHODOLOGY §14 Part E)
  # ============================================================================

  sensitivity_analysis:
    description: "Which dimension, if scored one point differently, changes the verdict?"
    table:
      - dimension: "Organizational Friction (OF)"
        current_raw: 5
        current_rios: 2.25
        if_minus_1_raw: 4
        if_minus_1_rios: 2.375
        verdict_impact: "Still VALIDATE FIRST — OF needs to drop to raw=2 (OF_prime=4) to reach RIOS 2.75, still below 3.0 threshold."
      - dimension: "Distributability"
        current: 2
        current_rios: 2.25
        if_plus_1: 3
        if_plus_1_rios: 2.375
        verdict_impact: "Still VALIDATE FIRST. One-point improvement doesn't cross threshold."
      - dimension: "Quantified Outcome"
        current: 2
        current_rios: 2.25
        if_plus_1: 3
        if_plus_1_rios: 2.375
        verdict_impact: "Still VALIDATE FIRST."
      - dimension: "Compounding"
        current: 2
        current_rios: 2.25
        if_plus_1: 3
        if_plus_1_rios: 2.375
        verdict_impact: "Still VALIDATE FIRST."
      - dimension: "ALL FOUR low dimensions +1"
        current_rios: 2.25
        if_all_four_plus_1: 2.75
        verdict_impact: "Still VALIDATE FIRST — RIOS needs to cross 3.0, requiring 6 of 8 dimensions to improve by at least 1 each."
    most_sensitive_dimension: "Organizational Friction"
    most_sensitive_reason: >
      Although OF's impact on RIOS is constrained by the inversion formula
      (OF_prime = 6 - OF), OF at raw=5 is the MOST DANGEROUS dimension because
      it represents an existential blocker. If this dimension could be resolved
      (OF raw → 2, OF_prime → 4), the RIOS would still only reach 2.5. The
      verdict doesn't flip on any single dimension — the niche needs MULTIPLE
      improvements to cross the threshold. This confirms VALIDATE FIRST is
      structurally correct.
    highest_roi_validation_target: "Organizational Friction — resolving the Bullhorn AI Fair Use Policy question. If the policy is a hard blocker, the niche is DEAD regardless of all other scores. This question has the highest ROI because it determines whether the niche is viable OR zero."

  # ============================================================================
  # COMPETITIVE RIOS COMPARISON (NICHE-METHODOLOGY §14 Part F — vs SyncGTM)
  # ============================================================================
  # NOTE: Web research (2026-07-23) reveals SyncGTM's published pricing is
  # $99-649/mo self-serve platform. The EUR 2,300/mo "managed service" figure
  # from PROJECT-STATE.md could not be confirmed via any published source.
  # SyncGTM appears to be a SELF-SERVE platform, not a managed service.
  # ============================================================================

  competitive_rios_vs_syncgtm:
    disclaimer: >
      SyncGTM characterization has been corrected from the original canvas.
      Published pricing shows $99-649/mo self-serve, NOT EUR 2,300/mo managed.
      ClarityRev's managed service at EUR 2,950/mo is a structurally different
      offer — it competes on DEPTH and domain expertise, not on price. The
      EUR 2,300 figure from PROJECT-STATE.md may have been a custom engagement
      or a different vendor. This changes the competitive landscape significantly.
    syncgtm_rios_scoring:
      quantified_outcome: 4  # Has published case studies, platform reviews, testimonials
      proven_likelihood: 4   # Multi-client, published platform, can demo live
      strategic_fit: 3       # Same niche fit — GTM intelligence for B2B
      time_to_value_raw: 2   # Self-serve = same-day setup (fast)
      ttv_prime: 4           # 6 - 2 = 4
      organizational_friction_raw: 2  # No Bullhorn dependency; HubSpot/Salesforce native
      of_prime: 4             # 6 - 2 = 4
      perceived_risk_raw: 3   # Established but self-serve = less hand-holding
      pr_prime: 3             # 6 - 3 = 3
      distributability: 4     # Self-serve = global distribution, free tier, no founder bottleneck
      compounding: 3          # Data network effects across 40+ data providers
      syncgtm_rios: 3.625     # mean(4, 4, 3, 4, 4, 3, 4, 3) = 29/8
    clarityrev_rios: 2.25
    delta: -1.375
    interpretation: >
      SyncGTM significantly outperforms ClarityRev on the RIOS score (3.625 vs 2.25).
      The delta is driven by three factors:
      1. Organizational Friction: SyncGTM doesn't depend on Bullhorn — it integrates
         with HubSpot/Salesforce natively without restrictive AI policies.
      2. Distributability: SyncGTM has a self-serve product with free tier, global
         reach, no founder-network bottleneck.
      3. Proven Likelihood: SyncGTM has real clients, case studies, and live product
         — ClarityRev has zero.
      ClarityRev's potential advantages (deeper managed service, niche-specific
      analysis) are currently theoretical — they don't exist yet.
    comparison_evidence_grade: "H"
    comparison_confidence: "LOW"

  # ============================================================================
  # RIOS SCORE TRAJECTORY (NICHE-METHODOLOGY §14 Part G)
  # ============================================================================

  rios_trajectory:
    today_zero_clients:
      rios: 2.25
      confidence: "LOW"
      what_changes: "Desk research only. Bullhorn policy unresolved. Zero case studies. Gapstars unclosed."
    month_6_with_execution:
      rios: 2.75
      confidence: "MEDIUM"
      what_changes: >
        IF (a) Gapstars closes, (b) Bullhorn policy is resolved via workaround or
        partnership, (c) 2-3 additional prospects engaged: Quantified Outcome → 3
        (first case study available), Proven Likelihood → 3 (1-2 clients served),
        Distributability → 3 (warm referrals from Gapstars).
        OF would improve from 5 to 3 if policy is resolved → OF_prime 3 instead of 1.
        Improved RIOS: mean(3, 3, 3, 3, 3, 3, 3, 2) = 23/8 = 2.875
        STILL BELOW 3.0. Still VALIDATE FIRST.
    month_12_scaled:
      rios: 3.125
      confidence: "MEDIUM-HIGH"
      what_changes: >
        IF 5-10 clients onboarded and Bullhorn resolved: Compounding → 3 (benchmark
        data starting to compound). All dimensions at 3 except Strategic Fit (3).
        RIOS: mean(3, 3, 3, 3, 3, 3, 3, 3) = 24/8 = 3.0
        LAUNCH PENDING achievable but requires 5-10 paying clients and Bullhorn
        resolution. This is a 12-month path assuming flawless execution.

  # ============================================================================
  # SCORE RECONCILIATION NOTE (NICHE-METHODOLOGY §14 Part H)
  # ============================================================================
  # Required when no dimension scores ≤2 — but we DO have dimensions ≤2, so
  # this note explains why the LOW scores are justified.
  # ============================================================================

  score_reconciliation: >
    NOT REQUIRED (methodology requires reconciliation only when no dimension
    scores ≤2). The corrected scoring has FIVE dimensions at ≤2 (Quantified
    Outcome: 2, Proven Likelihood: 2, Distributability: 2, Compounding: 2,
    and Organizational Friction raw: 5 which inverts to OF_prime: 1). These
    are justified by: (1) zero-client evidence ceiling per §12.13.3, (2) the
    actual Bullhorn AI Fair Use Policy text prohibiting the business model,
    (3) founder-market mismatch on distribution — Bob has no staffing network.
    No inflation defense needed — the scores are genuinely low for structurally
