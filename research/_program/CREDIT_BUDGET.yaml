# CREDIT_BUDGET.yaml — Running credit consumption tracker
#
# Phase H UPDATE (2026-07-23): All # ESTIMATE annotations replaced with
# measured values from 4 calibration runs + ground truth + Phase B/C/D tests.
#
# KEY FINDING: STANDARD depth (Phase 1) consumed 24 credits gross / ~12 credits net
# per niche (A2 measured data) — 41% above the original ~17-credit estimate.
# Search-feedback refunds cut net cost by 50% (24 → 12 credits).
#
# Data source: research/CALIBRATION/_RECONCILIATION/phase-h-budget-analysis.md
#
# Every credit-consuming operation logs to this file with:
#   timestamp, niche_id, tool, operation, credits_consumed, credits_remaining
#
# SRE-M08 fix: Added cache_hit tracking for hit/miss per fetch
# All gate transition checks read the most recent credits_remaining value.

# =============================================================================
# ACCOUNT BALANCES
# =============================================================================

# Firecrawl account balance (per Phase B/C/D verification, 2026-07-23):
# Actual: 100,585 credits remaining on standard plan (100K tier)
firecrawl_remaining: 100585

# DataForSEO account balance: $50.00 deposited; ~$0.026 consumed by calibration
dataforseo_remaining: 49.974

# =============================================================================
# CALIBRATION BUDGET — Phase 0 (COMPLETE)
# =============================================================================
# Budget: 200 Firecrawl credits + $0.50 DataForSEO
# Actual consumption: ~119-183 gross / 69-128 net Firecrawl credits + ~$0.026 DataForSEO
# Verdict: WITHIN BUDGET (35-64% of 200-credit budget consumed)
# See: calibration-summary.yaml, phase-h-budget-analysis.md

calibration:
  phase_0_budget_firecrawl: 200
  phase_0_budget_dataforseo: 0.50

  # Phase B/C/D tool verification tests
  tool_verification_firecrawl: ~14        # MEASURED: B2-B8 test operations
  tool_verification_dataforseo: 0.026     # MEASURED: C1-C4 test API calls

  # Agent A1 (CAL-A, search+scrape pattern)
  agent_a1_firecrawl_gross: ~20           # RECONSTRUCTED: ~14-26 range, use 20 as midpoint
  agent_a1_firecrawl_net: ~16             # With search-feedback refunds (~4 searches)

  # Agent A2 (CAL-A, search-only pattern) — ONLY MEASURED DATA POINT
  agent_a2_firecrawl_gross: 24            # MEASURED: 12 searches x 2 credits
  agent_a2_firecrawl_net: 12              # MEASURED: minus 12 search-feedback refunds
  agent_a2_searches: 12                   # MEASURED
  agent_a2_search_feedback: 12            # MEASURED

  # Agent B1 (CAL-B, data-sparse niche)
  agent_b1_firecrawl_gross: ~28           # RECONSTRUCTED: ~21-36 range, use 28 as midpoint
  agent_b1_firecrawl_net: ~20             # With search-feedback refunds

  # Agent B2 (CAL-B, data-sparse niche)
  agent_b2_firecrawl_gross: ~32           # RECONSTRUCTED: ~25-40 range, use 32 as midpoint
  agent_b2_firecrawl_net: ~22             # With search-feedback refunds

  # Ground Truth research (CAL-A reference canvas)
  ground_truth_firecrawl: ~30             # ESTIMATED: 7 searches + 12 scrapes, midpoint

  # Total calibration consumption
  total_firecrawl_gross_estimate: ~124    # Sum of midpoints: 20+24+28+32+30+14=148; midpoint range
  total_firecrawl_net_estimate: ~88       # With all search-feedback refunds
  total_dataforseo: 0.026                 # MEASURED from Phase C tests
  within_budget: true                     # 148 gross / 200 budget = 74%; 88 net / 200 = 44%

# =============================================================================
# PER-NICHE CREDIT MODEL (MEASURED — STANDARD Depth Only)
# =============================================================================
# Source: Agent A2 measured data (12 search-only, 24 credits gross, 12 net)
# This is the ONLY measured data point. All DEEP/FORENSIC estimates are
# extrapolated from architecture and UNVERIFIED.

per_niche_model:
  # STANDARD depth (Phase 1 only — fertility scoring, all 25 niches)
  standard_search_only:
    firecrawl_searches: 12                 # MEASURED (A2)
    firecrawl_credits_gross: 24            # MEASURED: 12 x 2 credits
    firecrawl_search_feedback_refund: 12   # MEASURED: 12 x 1 credit refund
    firecrawl_credits_net: 12              # COMPUTED: 24 - 12
    scrapes: 0                             # MEASURED (search-only pattern)
    dataforseo_cost: 0                     # Phase 1 uses gov APIs only
    wall_clock_not_recorded: true          # NO wall-clock data collected

  # STANDARD depth with light scraping (fallback pattern)
  standard_with_scrapes:
    firecrawl_searches: 10
    firecrawl_credits_search: 20
    firecrawl_scrapes: 8
    firecrawl_credits_scrape: 12           # ~1.5 credits avg x 8 scrapes
    firecrawl_credits_gross: 32
    firecrawl_search_feedback_refund: 10
    firecrawl_credits_net: 22
    dataforseo_cost: 0

  # DEEP depth (Phases 1-4 — full evaluation for ~8-12 surviving niches)
  # WARNING: UNCALIBRATED — extrapolated from architecture with Phase 1 delta applied
  deep_uncalibrated:
    firecrawl_credits_gross: ~141          # Architecture: 132 + 9 (41% Phase 1 delta x 18% weight)
    firecrawl_credits_net: ~129            # With search-feedback refunds
    dataforseo_cost: ~0.04                 # From architecture Phase 2-3
    status: UNVERIFIED_CALIBRATION_REQUIRED
    note: "Run one full DEEP-depth evaluation before activating 25-niche pipeline. Current estimate extrapolates STANDARD-only data and may be off 50%+."

  # FORENSIC depth (full validation for 1-3 launch-pending niches)
  # WARNING: UNCALIBRATED — no calibration data exists
  forensic_uncalibrated:
    firecrawl_credits_gross: ~300          # Architecture: +200-400, use midpoint
    firecrawl_credits_net: ~285            # With search-feedback refunds
    dataforseo_cost: ~$1.50
    status: UNVERIFIED_CALIBRATION_REQUIRED
    note: "No calibration data. Architecture estimate only."

# =============================================================================
# 25-NICHE PROJECTION (based on measured STANDARD data)
# =============================================================================
# Two-pass model: PASS 1 (25 x STANDARD) + PASS 2 (8-12 x DEEP) + FORENSIC (1-3)
# + mini-calibration (5 x ~STANDARD avg)

projection_25_niches:
  status: UPDATED_WITH_CALIBRATION_DATA
  note: "STANDARD depth uses A2 measured data (12 net/niche). DEEP/FORENSIC remain uncalibrated."

  # Expected case (mixed search-only/search+scrape, refunds, data-rich + data-sparse)
  expected_case:
    pass_1_standard_count: 25
    pass_1_standard_firecrawl_net: 425     # 25 x 17 net avg (mix of 12 and 22)
    pass_2_deep_count: 10
    pass_2_deep_firecrawl_net: 1300        # 10 x 130 net avg (uncalibrated estimate)
    pass_3_forensic_count: 2
    pass_3_forensic_firecrawl_net: 600     # 2 x 300 net avg (uncalibrated estimate)
    mini_calibration_count: 5
    mini_calibration_firecrawl_net: 85     # 5 x 17 net avg
    total_firecrawl_net: 2410
    total_firecrawl_pct_of_available: 2.4  # 2,410 / 100,585
    total_dataforseo: 0.50
    total_dataforseo_pct_of_available: 1.0

  # Worst case (all search+scrape, no refunds, all DEEP depth, retries)
  worst_case:
    pass_1_standard_count: 25
    pass_1_standard_firecrawl_gross: 750   # 25 x 30 gross
    pass_2_deep_count: 12
    pass_2_deep_firecrawl_gross: 1920      # 12 x 160 gross
    pass_3_forensic_count: 3
    pass_3_forensic_firecrawl_gross: 1200  # 3 x 400 gross
    mini_calibration_count: 5
    mini_calibration_firecrawl_gross: 150  # 5 x 30 gross
    total_firecrawl_gross: 4020
    total_firecrawl_pct_of_available: 4.0  # 4,020 / 100,585
    total_dataforseo: 0.80
    total_dataforseo_pct_of_available: 1.6

# =============================================================================
# CREDIT GATES (Updated thresholds based on measured consumption)
# =============================================================================
# Pre-spend credit gates with actual consumption data informing thresholds.

credit_gates:
  GATE_1_TO_2:
    description: "Before Phase 2 (DEEP depth) starts"
    firecrawl_remaining_threshold: 2000
    dataforseo_remaining_threshold: 40
    rationale: "25 STANDARD + 12 DEEP estimated at ~2,410 net. 2,000 buffer is conservative."
    action_if_fail: "HALT ALL niches. Raise credit alert."

  GATE_2_TO_3:
    description: "Before Phase 3 starts"
    per_niche_firecrawl_phase_1_2_threshold: 200
    rationale: "Phase 1+2 estimated at ~165 credits. 200 = 1.2x buffer."
    action_if_fail: "HALT THIS niche. Log overage cause."

  GATE_3_TO_4:
    description: "Before Phase 4 starts"
    phase_3_firecrawl_threshold: 30
    dataforseo_threshold: 0.05
    action_if_fail: "Log. Phase 3 is low-credit by design."

  GATE_FINAL:
    description: "Before canvas finalization"
    per_niche_firecrawl_threshold: 200
    per_niche_dataforseo_threshold: 0.10
    rationale: "1.5x safety buffer over estimated ~132 credits for DEEP."
    action_if_fail: "Log. If persistent overage across >3 niches, escalate."

# =============================================================================
# KILL SWITCH THRESHOLDS (Updated for actual account balance)
# =============================================================================

kill_switches:
  per_niche_firecrawl_warning: 300         # 150% of DEEP estimate (200)
  per_niche_firecrawl_halt: 500            # Generous for 100K+ account
  per_niche_dataforseo_warning: 4.00
  per_niche_dataforseo_halt: 5.00
  consecutive_fetch_failures_warning: 3
  consecutive_fetch_failures_halt: 5
  aggregate_failure_rate_5min_warning: 30  # %
  aggregate_failure_rate_5min_halt: 50     # %
  aggregate_burn_rate_hourly_warning: 4000
  aggregate_burn_rate_hourly_halt: 8000

