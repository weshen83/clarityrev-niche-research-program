version: '1.0'
created: '2026-07-23'
description: Schema for evidence integrity alerts generated by the semantic checker
  and grade engine. Alerts fire when the semantic verifier detects a fabricated or
  unsupported claim, a contradictory source, or other evidence integrity failure.

# ─── Schema ───────────────────────────────────────────────────────────────────
# alerts is an append-only list. New alerts are pushed without removing old ones.
# The semantic-checker script appends to this file when a claim grades as
# CONTRADICTS, or when a CRITICAL-section claim grades as NEUTRAL or below.

alerts: []

fields:
  alert_id:
    type: str
    description: "Unique alert identifier (format: ALERT-{YYYYMMDD}-{N-XXX}-{NNN})"
    required: true

  niche_id:
    type: str
    description: Niche identifier (e.g. N-001)
    required: true

  trace_map_id:
    type: str
    description: Trace-map claim ID that triggered the alert
    required: true

  claim_text:
    type: str
    description: The exact claim text that triggered the integrity alert
    required: true

  verifier_verdict:
    type: str
    description: The semantic grade assigned (CONTRADICTS, NEUTRAL, or SOURCE_UNAVAILABLE
      for critical claims)
    required: true

  source_url:
    type: str
    description: The source URL that was checked
    required: true

  timestamp:
    type: datetime
    description: ISO 8601 datetime when the alert was generated
    required: true

  severity:
    type: enum
    values: [WARNING, CRITICAL]
    description: |
      WARNING  — Claim grades CONTRADICTS (active contradiction found).
                Requires human review before the claim can be used.
      CRITICAL — CRITICAL-section claim (market_size, competitive_threat,
                revenue_leak) grades NEUTRAL or below. Blocks pipeline
                progression until resolved.
    required: true

  rationale:
    type: str
    description: Detailed explanation of why the alert was raised, including
      extracted quotes and model reasoning
    required: true
