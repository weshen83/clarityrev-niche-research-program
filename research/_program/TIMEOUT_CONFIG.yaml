# TIMEOUT_CONFIG.yaml — Structured 3-level timeouts per tool
#
# Three levels per entry:
#   connect:  Time to establish TCP connection
#   read:     Time to receive first byte of response body
#   total:    Hard kill — wall-clock max for entire operation
#
# Design principles (Netflix Chaos Engineering: assume failure):
#   - Connect timeout SHORT (5-10s) — if a host is unreachable, fail fast
#   - Read timeout MEDIUM (15-45s) — most responses arrive within this window
#   - Total timeout is the hard ceiling — if exceeded, mark TIMEOUT and use fallback
#
# Free APIs have longer timeouts because they are unreliable by nature.
# Primary tools (Firecrawl, DataForSEO) have shorter timeouts with retry+fallback.
#
# Last updated: 2026-07-23
# Source: WORKSTREAM-C RELIABILITY FIX — restructured to 3-level per SRE-MB4

firecrawl:
  search:
    connect: 10
    read: 30
    total: 60
  scrape:
    static:
      connect: 10
      read: 30
      total: 45          # Static pages resolve quickly
    js_rendered:
      connect: 10
      read: 45
      total: 90          # JS rendering adds latency (SRE-MB5 fix: was 60s → 90s)
  crawl:
    per_page:
      connect: 10
      read: 30
      total: 60          # Per-page within a crawl job
  map:
    connect: 10
