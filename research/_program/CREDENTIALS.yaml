# Credential references — env-var names only, NO actual keys
# Actual keys stored in ~/.claude/settings.json under "env" field

firecrawl:
  env_var: FIRECRAWL_API_KEY
  status: SET

dataforseo:
  login_env_var: DATAFORSEO_LOGIN
  password_env_var: DATAFORSEO_PASSWORD
  status: SET

companies_house:
  env_var: COMPANIES_HOUSE_API_KEY
  status: SET
  verified: true
  rate_limit: 600 req/5min

fred:
  env_var: FRED_API_KEY
  status: SET
  verified: true
  rate_limit: 120 req/min

currents:
  env_var: CURRENTS_API_KEY
  status: SET
  verified: true
  rate_limit: 1000 req/day
  note: "Use /v1/search endpoint, NOT /v1/latest-news for limit param"

hubspot:
  env_var: HUBSPOT_API_KEY
  status: SET
  verified: false
  rate_limit: 250000 req/day

brandfetch:
  env_var: BRANDFETCH_API_KEY
  status: SET
  verified: true
  rate_limit: 500000 req/mo

google:
  env_var: GOOGLE_API_KEY
  status: SET
  verified: true
  apis: [YouTube Data API v3]
  rate_limit: 10000 quota/day

openregistry:
  type: mcp
  transport: sse
  url: https://openregistry.sophymarine.com/mcp
  status: CONFIGURED

zefix:
  status: SKIPPED
  reason: "Not valuable enough for 25-niche pipeline"
  fallback: "OpenRegistry MCP covers EU company registries including NL KVK"

open_pagerank:
  status: SKIPPED
  reason: "Not valuable enough — domain authority is a weak niche signal"
  fallback: "DataForSEO Backlinks API for domain authority assessment"

techmap:
  status: SKIPPED
  reason: "Free tier too small for 25 niches — would require paid tier"
  fallback: "Greenhouse/Lever public ATS APIs + DataForSEO SERP for hiring signals"

last_checked: '2026-07-23'
