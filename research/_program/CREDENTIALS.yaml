# Credential references — env-var names only, NO actual keys
# Actual keys stored in ~/.claude/settings.json under "env" field

firecrawl:
  env_var: FIRECRAWL_API_KEY
  status: SET
  storage: "~/.claude/settings.json env field (migrated from ~/.bashrc 2026-07-23)"
  expires: "unknown"  # No documented expiry; verify annually
  last_rotated: "2026-07-23"

dataforseo:
  login_env_var: DATAFORSEO_LOGIN
  password_env_var: DATAFORSEO_PASSWORD
  status: SET
  storage: "~/.claude/settings.json env field (migrated from ~/.bashrc 2026-07-23)"
  expires: "unknown"  # No documented expiry; verify annually
  last_rotated: "2026-07-23"

companies_house:
  env_var: COMPANIES_HOUSE_API_KEY
  status: SET
  verified: true
  commercial_use_verified: true
  commercial_use_note: "UK Companies House API permits commercial use with rate limit compliance. Verified 2026-07-23 at https://developer.company-information.service.gov.uk/"
  rate_limit: 600 req/5min
  expires: "unknown"
  last_rotated: "unknown"

fred:
  status: REMOVED
  reason: "FRED API terms: non-commercial use only. ClarityRev is commercial."
  removed_date: "2026-07-23"
  replacement: "World Bank API + IMF Data API (both unlimited, no restrictions)"

currents:
  env_var: CURRENTS_API_KEY
  status: SET
  verified: true
  rate_limit: 1000 req/day
  note: "Use /v1/search endpoint, NOT /v1/latest-news for limit param"
  expires: "unknown"
  last_rotated: "unknown"

hubspot:
  env_var: HUBSPOT_API_KEY
  status: SET
  verified: false
  rate_limit: 250000 req/day
  expires: "unknown"
  last_rotated: "unknown"

brandfetch:
  env_var: BRANDFETCH_API_KEY
  status: SET
  verified: true
  rate_limit: 500000 req/mo
  expires: "unknown"
  last_rotated: "unknown"

google:
  env_var: GOOGLE_API_KEY
  status: SET
  verified: true
  apis: [YouTube Data API v3]
  rate_limit: 10000 quota/day
  youtube_quota_budget_per_niche: 500
  youtube_quota_unit_cost_search: 100
  youtube_quota_remaining_today: null  # Check before YouTube API calls
  youtube_quota_last_check: "2026-07-23"
  expires: "unknown"
  last_rotated: "unknown"

openregistry:
  type: mcp
  transport: sse
  url: https://openregistry.sophymarine.com/mcp
  status: CONFIGURED

zefix:
  status: SKIPPED
  reason: "Not valuable enough for 25-niche pipeline"
  fallback: "OpenRegistry MCP covers EU company registries including NL KVK"

open_pagerank:
  status: SKIPPED
  reason: "Not valuable enough — domain authority is a weak niche signal"
  fallback: "DataForSEO Backlinks API for domain authority assessment"

techmap:
  status: SKIPPED
  reason: "Free tier too small for 25 niches — would require paid tier"
  fallback: "Greenhouse/Lever public ATS APIs + DataForSEO SERP for hiring signals"

last_checked: '2026-07-23'
